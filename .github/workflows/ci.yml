name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones anteriores de la misma rama/PR en curso.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # La versión de pnpm se lee de "packageManager" en package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Las claves RS256 están gitignored: se generan en cada ejecución.
      - name: Generate JWT keys (agent)
        run: bash scripts/gen-keys.sh
        working-directory: apps/agent

      # El Prisma Client no se commitea: hay que generarlo antes de typecheck/test.
      - name: Generate Prisma client
        run: pnpm --filter @krakenos/agent prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      # Detecta fallos de bundling (tsup del agente / Vite de la web) antes de prod.
      - name: Build
        run: pnpm build

      - name: Test (con coverage informativo)
        run: pnpm test:coverage

      # Auditoría de dependencias: informativa de momento (no bloquea el pipeline;
      # los hallazgos aparecen en el log para revisarlos). US-60.
      - name: Audit dependencies
        run: pnpm audit --audit-level high
        continue-on-error: true

  # Escaneo de secretos (gitleaks, BLOQUEANTE) + SAST (semgrep). US-92.
  # Job aparte para que corra en paralelo a build-test y falle de forma aislada.
  security:
    name: Secret scan · SAST
    runs-on: ubuntu-latest

    steps:
      # `fetch-depth: 0` para que gitleaks escanee TODO el historial, no solo HEAD.
      - name: Checkout (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # (1) Secretos: BLOQUEA el build. Las joyas de la corona (keys/, .env, *.db)
      # están gitignored; gitleaks es la red de seguridad si alguien las commitea,
      # además de detectar claves privadas/tokens en cualquier fichero del historial.
      # Binario pin-eado a una versión exacta (sin "latest") → reproducible.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --verbose

      # (2) SAST: semgrep con engine pin-eado (imagen Docker por versión exacta) y
      # acotado al código fuente (src/), no a node_modules/tests/build. Reglas por
      # defecto + JS/TS. `--error` hace que cualquier hallazgo BLOQUEE el build.
      # Nota: los packs `p/*` se descargan del registro de semgrep en cada ejecución;
      # el engine está fijado, pero las reglas pueden evolucionar (ver reporte US-92).
      - name: SAST (semgrep)
        env:
          SEMGREP_VERSION: '1.95.0'
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/src" -w /src \
            "semgrep/semgrep:${SEMGREP_VERSION}" \
            semgrep scan \
              --config p/default \
              --config p/javascript \
              --config p/typescript \
              --error \
              --metrics off \
              --disable-version-check \
              apps/agent/src apps/web/src packages/types/src
