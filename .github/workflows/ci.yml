name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones anteriores de la misma rama/PR en curso.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # La versión de pnpm se lee de "packageManager" en package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Las claves RS256 están gitignored: se generan en cada ejecución.
      - name: Generate JWT keys (agent)
        run: bash scripts/gen-keys.sh
        working-directory: apps/agent

      # El Prisma Client no se commitea: hay que generarlo antes de typecheck/test.
      - name: Generate Prisma client
        run: pnpm --filter @krakenos/agent prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      # Detecta fallos de bundling (tsup del agente / Vite de la web) antes de prod.
      - name: Build
        run: pnpm build

      - name: Test (con coverage informativo)
        run: pnpm test:coverage

      # Auditoría de dependencias: informativa de momento (no bloquea el pipeline;
      # los hallazgos aparecen en el log para revisarlos). US-60.
      - name: Audit dependencies
        run: pnpm audit --audit-level high
        continue-on-error: true
